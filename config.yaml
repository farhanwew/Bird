# BirdCLEF+ 2026 - Configuration

# Data paths - supports both local and Google Drive
# For Google Drive: /content/drive/MyDrive/bird-data
# For local: ./data
DATA_DIR: "/content/drive/MyDrive/bird-data"
TRAIN_AUDIO_DIR: "/content/drive/MyDrive/bird-data/train_audio"
TEST_SOUNDSCAPES_DIR: "/content/drive/MyDrive/bird-data/test_soundscapes"
TRAIN_SOUNDSCAPES_DIR: "/content/drive/MyDrive/bird-data/train_soundscapes"

# Files
TRAIN_CSV: "/content/drive/MyDrive/bird-data/train.csv"
SAMPLE_SUBMISSION_CSV: "/content/drive/MyDrive/bird-data/sample_submission.csv"
TAXONOMY_CSV: "/content/drive/MyDrive/bird-data/taxonomy.csv"
TRAIN_SOUNDSCAPES_LABELS: "/content/drive/MyDrive/bird-data/train_soundscapes_labels.csv"

# Audio parameters
SAMPLE_RATE: 32000
N_MELS: 128
N_FFT: 2048
HOP_LENGTH: 512
DURATION: 5

# Training parameters
BATCH_SIZE: 32
NUM_WORKERS: 2
MAX_EPOCHS: 10
LEARNING_RATE: 0.001

# Model
NUM_CLASSES: 234
BACKBONE: "efficientnet_b0"

# Output
OUTPUT_DIR: "output"

# Optimizer / scheduler
OPTIMIZER: "adamw"
WEIGHT_DECAY: 0.01
SCHEDULER: "cosine"

# Validation
VAL_SPLIT: 0.1
VAL_SEED: 42
SAVE_BEST_MODEL: true

# Labels
USE_SECONDARY_LABELS: true
SECONDARY_LABEL_WEIGHT: 0.5

# Augmentation (training only)
AUGMENT: true
AUGMENT_PROB: 0.5
FREQ_MASK_MAX: 27
FREQ_MASK_NUM: 2
TIME_MASK_MAX: 40
TIME_MASK_NUM: 2
MIXUP_ALPHA: 0.4
BRIGHTNESS_FACTOR: 0.2

# Soundscape training
USE_TRAIN_SOUNDSCAPES: true
SOUNDSCAPE_OVERSAMPLE: 2.0
USE_WEIGHTED_SAMPLER: true

# Pseudo-labeling
PSEUDO_LABEL_CSV: ""
PSEUDO_LABEL_THRESHOLD: 0.3
PSEUDO_LABEL_USE_SOFT: true
PSEUDO_LABEL_WEIGHT: 0.5
PSEUDO_LABEL_MIN_CONF: 0.3

# ONNX inference
USE_ONNX: false
ONNX_OPSET: 17
ONNX_MODEL_PATH: "output/model.onnx"
ONNX_NUM_THREADS: 4
INFERENCE_BATCH_SIZE: 64