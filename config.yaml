# BirdCLEF+ 2026 - Configuration

# Data paths - supports both local and Google Drive
# For Google Drive: /content/drive/MyDrive/bird-data
# For local: ./data
DATA_DIR: "/content/drive/MyDrive/bird-data"
TRAIN_AUDIO_DIR: "/content/drive/MyDrive/bird-data/train_audio"
TEST_SOUNDSCAPES_DIR: "/content/drive/MyDrive/bird-data/test_soundscapes"
TRAIN_SOUNDSCAPES_DIR: "/content/drive/MyDrive/bird-data/train_soundscapes"

# Files
TRAIN_CSV: "/content/drive/MyDrive/bird-data/train.csv"
SAMPLE_SUBMISSION_CSV: "/content/drive/MyDrive/bird-data/sample_submission.csv"
TAXONOMY_CSV: "/content/drive/MyDrive/bird-data/taxonomy.csv"
TRAIN_SOUNDSCAPES_LABELS: "/content/drive/MyDrive/bird-data/train_soundscapes_labels.csv"

# Audio parameters
SAMPLE_RATE: 32000
N_MELS: 128
N_FFT: 2048
HOP_LENGTH: 512
DURATION: 5

# Training parameters
BATCH_SIZE: 32
NUM_WORKERS: 2
MAX_EPOCHS: 10
LEARNING_RATE: 0.001

# Model
NUM_CLASSES: 234
BACKBONE: "efficientnet_b0"

# Output
OUTPUT_DIR: "output"

# Optimizer / scheduler
OPTIMIZER: "adamw"
WEIGHT_DECAY: 0.01
SCHEDULER: "cosine"

# Validation
VAL_SPLIT: 0.1
VAL_SEED: 42
VAL_FROM_SOUNDSCAPES: false  # true = val dari soundscapes (domain-matched, realistis)
VAL_SOUNDSCAPE_FRAC: 0.15    # 15% soundscape files untuk val
SAVE_BEST_MODEL: true

# Labels
USE_SECONDARY_LABELS: true
SECONDARY_LABEL_WEIGHT: 0.5

# Augmentation (training only)
AUGMENT: true
AUGMENT_PROB: 0.5
FREQ_MASK_MAX: 27
FREQ_MASK_NUM: 2
TIME_MASK_MAX: 40
TIME_MASK_NUM: 2
MIXUP_ALPHA: 0.4
BRIGHTNESS_FACTOR: 0.2

# Soundscape training
USE_TRAIN_SOUNDSCAPES: true
SOUNDSCAPE_OVERSAMPLE: 2.0
USE_WEIGHTED_SAMPLER: true

# Pseudo-labeling
PSEUDO_LABEL_CSV: ""
PSEUDO_LABEL_THRESHOLD: 0.3
PSEUDO_LABEL_USE_SOFT: true
PSEUDO_LABEL_WEIGHT: 0.5
PSEUDO_LABEL_MIN_CONF: 0.3

# ONNX inference
USE_ONNX: false
ONNX_OPSET: 17
ONNX_MODEL_PATH: "output/model.onnx"
ONNX_NUM_THREADS: 4
INFERENCE_BATCH_SIZE: 64

# Mel spectrogram cache (pre-computed .npy files for 5-10x training speedup)
MEL_CACHE_DIR: "output/mel_cache"   # set to "" to disable; run cache_mel.py to populate

# Backbone freezing (gradual unfreezing)
FREEZE_EPOCHS: 0             # 0 = no freezing, 3 = freeze backbone for first 3 epochs

# Loss function
LOSS: "bce"              # "bce" or "focal_bce"
FOCAL_GAMMA: 2.0         # only used when LOSS: "focal_bce"

# Perch embedding extraction
PERCH:
  MODEL_DIR: ""                        # path to Perch TF SavedModel
  CACHE_DIR: "output/perch_cache"
  BATCH_FILES: 16
  WINDOW_SEC: 5
  N_WINDOWS: 12

# ProtoSSM training
SSM:
  D_MODEL: 320
  D_STATE: 32
  N_SSM_LAYERS: 4
  DROPOUT: 0.12
  USE_CROSS_ATTN: true
  CROSS_ATTN_HEADS: 8
  N_EPOCHS: 80
  LR: 0.0008
  WEIGHT_DECAY: 0.001
  PATIENCE: 20
  POS_WEIGHT_CAP: 25.0
  DISTILL_WEIGHT: 0.15
  LABEL_SMOOTHING: 0.03
  FOCAL_GAMMA: 2.5
  SWA_START_FRAC: 0.65
  SWA_LR: 0.0004
  RESIDUAL_WEIGHT: 0.35